[build]
  publish = "."
  command = "echo 'No build command needed for static HTML'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200